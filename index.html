<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedey Test Mykhailovskyi</title>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css" rel="stylesheet" />

<script defer src="bundle.js"></script><link href="main.css" rel="stylesheet"></head>

<body>
    <div class="container">
        <div class="select">
            <div class="location">
                <div class="select__title">Место или название отеля</div>
                <div class="select-input">
                    <div class="location__img"><img src="/src/assets/img/location.png" alt=""></div>
                    <input type="text" placeholder="Введите здесь место" class="location__name">

                </div>
            </div>
            <div class="date">
                <div class="entry">
                    <div class="select__title">Заезд</div>
                    <div class="select-input">
                        <div class="location__img"><img src="/src/assets/img/calendar.png" alt=""></div>
                        <input type="date" placeholder="Введите здесь место" class="location__name">

                    </div>
                </div>
                <div class="exit">
                    <div class="select__title">Выезд</div>
                    <div class="select-input">
                        <input type="date" placeholder="Введите здесь место" class="location__name">

                    </div>
                </div>
            </div>
            <div class="counter room">
                <div class="select__title">номера</div>
                <div class="select-number">
                    <input type="text" value="0" class="count">
                    <div class="count-buttons">
                        <button data-direction="plus" class="counter-btn ">
                            <div class="count-plus"></div>
                        </button>
                        <button data-direction="minus" class="counter-btn">
                            <div class="count-minus"></div>
                        </button>
                    </div>
                </div>

            </div>
            <div class="counter adult">
                <div class="select__title">Взрослые</div>
                <div class="select-number">
                    <input type="text" value="0" class="count">
                    <div class="count-buttons">
                        <button data-direction="plus" class="counter-btn ">
                            <div class="count-plus"></div>
                        </button>
                        <button data-direction="minus" class="counter-btn">
                            <div class="count-minus"></div>
                        </button>
                    </div>
                </div>
            </div>
            <div class="counter child">
                <div class="select__title">Дети</div>
                <div class="select-number">
                    <input type="text" value="0" class="count">
                    <div class="count-buttons">
                        <button data-direction="plus" class="counter-btn ">
                            <div class="count-plus"></div>
                        </button>
                        <button data-direction="minus" class="counter-btn">
                            <div class="count-minus"></div>
                        </button>
                    </div>
                </div>
            </div>
            <div class="plus"></div>
            <button class="find">НАЙТИ</button>
        </div>
    </div>
</body>

</html>
